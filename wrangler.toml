name = "laspace"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "laspace-events"
database_id = "9a86a176-b94e-4c04-9d4b-1ebbb0050b8d"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "laspace-images"

[[routes]]
pattern = "laspaceevents.com/*"
zone_name = "laspaceevents.com"

[[routes]]
pattern = "www.laspaceevents.com/*"
zone_name = "laspaceevents.com"

[vars]
# Admin password must be set as a Wrangler secret (not hardcoded here)
# Set via: wrangler secret put ADMIN_PASS
# Brevo API key — set via: wrangler secret put BREVO_API_KEY
BREVO_LIST_ID = "2"
