<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Space Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Space Grotesk',sans-serif}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Login -->
  <div id="login" class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 w-full max-w-sm">
      <h1 class="text-2xl font-bold mb-6 text-center">La Space Admin</h1>
      <input id="password" type="password" placeholder="Salasana" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 mb-4 text-white focus:outline-none focus:border-purple-500">
      <button id="login-btn" class="w-full bg-purple-600 hover:bg-purple-700 font-bold py-3 rounded-lg transition-colors">Kirjaudu</button>
      <p id="login-error" class="text-red-400 text-sm mt-3 hidden text-center">Väärä salasana</p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="panel" class="hidden">
    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">La Space <span class="text-purple-400">Admin</span></h1>
      <div class="flex gap-3">
        <a href="https://laspace.pages.dev" target="_blank" class="text-sm text-gray-400 hover:text-white transition-colors">Katso sivu</a>
        <button id="logout-btn" class="text-sm text-gray-400 hover:text-white transition-colors">Kirjaudu ulos</button>
      </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold">Tapahtumat</h2>
        <button id="new-event-btn" class="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded-lg font-medium transition-colors">+ Uusi tapahtuma</button>
      </div>
      <div id="events-list" class="space-y-4"></div>
    </div>
  </div>

  <!-- Event Form Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <h3 id="form-title" class="text-xl font-bold mb-6">Uusi tapahtuma</h3>
      <form id="event-form" class="space-y-4">
        <input type="hidden" id="f-id">
        <input type="hidden" id="f-image-url">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Nimi *</label>
          <input id="f-name" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Paiva *</label>
          <input id="f-date" type="date" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
          <p class="text-sm text-gray-500 mt-1">Paivalabel: <span id="f-date-preview" class="text-purple-400">-</span></p>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Paikka *</label>
          <input id="f-venue" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Kuvaus *</label>
          <textarea id="f-desc" rows="2" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Lippulinkki</label>
          <input id="f-ticket" type="url" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500" placeholder="https://...">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Kuva</label>
          <div id="image-preview" class="hidden mb-2 relative">
            <img id="image-preview-img" class="w-full h-32 object-cover rounded-lg">
            <button type="button" id="remove-image-btn" class="absolute top-2 right-2 bg-black/70 hover:bg-black text-white w-7 h-7 rounded-full flex items-center justify-center text-sm">x</button>
          </div>
          <label class="block w-full bg-gray-800 border border-gray-700 border-dashed rounded-lg px-4 py-4 text-center cursor-pointer hover:border-purple-500 transition-colors">
            <span id="upload-text" class="text-gray-400">Klikkaa valitaksesi kuva</span>
            <input id="f-image" type="file" accept="image/*" class="hidden">
          </label>
          <div id="upload-progress" class="hidden mt-2">
            <div class="h-1 bg-gray-800 rounded-full overflow-hidden">
              <div id="upload-bar" class="h-full bg-purple-500 transition-all" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Vari</label>
          <select id="f-color" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
            <option value="purple">Purple</option>
            <option value="blue">Blue</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <input id="f-visible" type="checkbox" checked class="w-4 h-4 accent-purple-500">
          <label for="f-visible" class="text-sm text-gray-400">Nakyvissa sivulla</label>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" id="save-btn" class="flex-1 bg-purple-600 hover:bg-purple-700 font-bold py-2.5 rounded-lg transition-colors">Tallenna</button>
          <button type="button" id="cancel-btn" class="flex-1 bg-gray-800 hover:bg-gray-700 font-bold py-2.5 rounded-lg transition-colors">Peruuta</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    var API_BASE = 'https://api.laspacefin.com';
    var token = localStorage.getItem('ls-token') || '';
    var DAYS_FI = ['Su','Ma','Ti','Ke','To','Pe','La'];

    function dateToLabel(dateStr) {
      if (!dateStr) return '-';
      var d = new Date(dateStr + 'T12:00:00');
      return DAYS_FI[d.getDay()] + ' ' + d.getDate() + '.' + (d.getMonth() + 1) + '.';
    }

    function $(id) { return document.getElementById(id); }

    // Date preview
    $('f-date').addEventListener('input', function() {
      $('f-date-preview').textContent = dateToLabel(this.value);
    });

    // Login
    $('login-btn').addEventListener('click', doLogin);
    $('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      var pw = $('password').value;
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_BASE + '/api/admin/events', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + pw);
      xhr.onload = function() {
        if (xhr.status === 200) {
          token = pw;
          localStorage.setItem('ls-token', token);
          showPanel();
        } else {
          $('login-error').classList.remove('hidden');
        }
      };
      xhr.send();
    }

    $('logout-btn').addEventListener('click', function() {
      token = '';
      localStorage.removeItem('ls-token');
      $('panel').classList.add('hidden');
      $('login').classList.remove('hidden');
      $('password').value = '';
    });

    function showPanel() {
      $('login').classList.add('hidden');
      $('panel').classList.remove('hidden');
      loadEvents();
    }

    // Auto-login
    if (token) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_BASE + '/api/admin/events', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onload = function() {
        if (xhr.status === 200) showPanel();
        else { token = ''; localStorage.removeItem('ls-token'); }
      };
      xhr.send();
    }

    // Load events
    function loadEvents() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_BASE + '/api/admin/events', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onload = function() {
        var events = JSON.parse(xhr.responseText);
        var list = $('events-list');
        if (events.length === 0) {
          list.innerHTML = '<p class="text-gray-500 text-center py-12">Ei tapahtumia. Lisaa ensimmainen!</p>';
          return;
        }
        var html = '';
        for (var i = 0; i < events.length; i++) {
          var e = events[i];
          var img = e.image_url ? '<img src="' + e.image_url + '" class="w-16 h-16 rounded-lg object-cover flex-shrink-0">' : '<div class="w-16 h-16 rounded-lg bg-gray-800 flex-shrink-0"></div>';
          var dot = e.color === 'blue' ? 'bg-cyan-400' : 'bg-purple-500';
          var hidden = e.visible ? '' : '<span class="text-xs bg-gray-800 text-gray-500 px-2 py-0.5 rounded">piilotettu</span>';
          var opacity = e.visible ? '' : ' opacity-50';
          html += '<div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex items-center gap-4' + opacity + '">'
            + img
            + '<div class="flex-1 min-w-0">'
            + '<div class="flex items-center gap-2 mb-1">'
            + '<span class="inline-block w-2 h-2 rounded-full ' + dot + '"></span>'
            + '<h3 class="font-bold truncate">' + e.name + '</h3>'
            + '<span class="text-xs text-gray-500">' + e.date_label + '</span>'
            + hidden
            + '</div>'
            + '<p class="text-sm text-gray-400 truncate">' + e.venue + ' — ' + e.description + '</p>'
            + '</div>'
            + '<div class="flex gap-2 flex-shrink-0">'
            + '<button onclick="editEvent(' + e.id + ')" class="text-sm bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded-lg transition-colors">Muokkaa</button>'
            + '<button onclick="deleteEvent(' + e.id + ')" class="text-sm bg-red-900/50 hover:bg-red-900 text-red-400 px-3 py-1.5 rounded-lg transition-colors">Poista</button>'
            + '</div></div>';
        }
        list.innerHTML = html;
        // Store events data for editing
        window._events = events;
      };
      xhr.send();
    }

    // New event
    $('new-event-btn').addEventListener('click', function() { openForm(null); });

    function openForm(ev) {
      $('form-title').textContent = ev ? 'Muokkaa tapahtumaa' : 'Uusi tapahtuma';
      $('f-id').value = ev ? ev.id : '';
      $('f-name').value = ev ? ev.name : '';
      $('f-date').value = ev ? ev.date : '';
      $('f-date-preview').textContent = ev ? dateToLabel(ev.date) : '-';
      $('f-venue').value = ev ? ev.venue : '';
      $('f-desc').value = ev ? ev.description : '';
      $('f-ticket').value = ev ? (ev.ticket_url || '') : '';
      $('f-image-url').value = ev ? (ev.image_url || '') : '';
      $('f-color').value = ev ? ev.color : 'purple';
      $('f-visible').checked = ev ? ev.visible !== 0 : true;
      $('f-image').value = '';
      $('upload-progress').classList.add('hidden');
      if (ev && ev.image_url) {
        $('image-preview-img').src = ev.image_url;
        $('image-preview').classList.remove('hidden');
        $('upload-text').textContent = 'Vaihda kuva';
      } else {
        $('image-preview').classList.add('hidden');
        $('upload-text').textContent = 'Klikkaa valitaksesi kuva';
      }
      $('modal').classList.remove('hidden');
    }

    function editEvent(id) {
      if (!window._events) return;
      for (var i = 0; i < window._events.length; i++) {
        if (window._events[i].id === id) {
          openForm(window._events[i]);
          return;
        }
      }
    }

    function deleteEvent(id) {
      if (!confirm('Poistetaanko tapahtuma?')) return;
      var xhr = new XMLHttpRequest();
      xhr.open('DELETE', API_BASE + '/api/admin/events/' + id, true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onload = function() { loadEvents(); };
      xhr.send();
    }

    // Cancel
    $('cancel-btn').addEventListener('click', function() {
      $('modal').classList.add('hidden');
    });

    // Remove image
    $('remove-image-btn').addEventListener('click', function() {
      $('f-image-url').value = '';
      $('f-image').value = '';
      $('image-preview').classList.add('hidden');
      $('upload-progress').classList.add('hidden');
      $('upload-text').textContent = 'Klikkaa valitaksesi kuva';
    });

    // Image upload
    $('f-image').addEventListener('change', function() {
      var file = this.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function(e) {
        $('image-preview-img').src = e.target.result;
        $('image-preview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);

      $('upload-text').textContent = 'Ladataan...';
      $('upload-progress').classList.remove('hidden');
      $('upload-bar').style.width = '30%';
      $('save-btn').disabled = true;

      var formData = new FormData();
      formData.append('image', file);

      var xhr = new XMLHttpRequest();
      xhr.open('POST', API_BASE + '/api/upload', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          $('upload-bar').style.width = Math.round((e.loaded / e.total) * 100) + '%';
        }
      };
      xhr.onload = function() {
        var data = JSON.parse(xhr.responseText);
        if (data.url) {
          $('f-image-url').value = data.url;
          $('upload-text').textContent = 'Kuva ladattu!';
        } else {
          $('upload-text').textContent = 'Virhe: ' + (data.error || 'tuntematon');
        }
        $('save-btn').disabled = false;
      };
      xhr.onerror = function() {
        $('upload-text').textContent = 'Lataus epaonnistui';
        $('save-btn').disabled = false;
      };
      xhr.send(formData);
    });

    // Save event
    $('event-form').addEventListener('submit', function(e) {
      e.preventDefault();

      var saveBtn = $('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Tallennetaan...';

      var id = $('f-id').value;
      var dateVal = $('f-date').value;
      var body = JSON.stringify({
        name: $('f-name').value,
        date: dateVal,
        date_label: dateToLabel(dateVal),
        venue: $('f-venue').value,
        description: $('f-desc').value,
        ticket_url: $('f-ticket').value,
        image_url: $('f-image-url').value,
        color: $('f-color').value,
        visible: $('f-visible').checked ? 1 : 0
      });

      var xhr = new XMLHttpRequest();
      xhr.open(id ? 'PUT' : 'POST', API_BASE + '/api/admin/events' + (id ? '/' + id : ''), true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onload = function() {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Tallenna';
        if (xhr.status >= 200 && xhr.status < 300) {
          $('modal').classList.add('hidden');
          loadEvents();
        } else {
          alert('Virhe ' + xhr.status + ': ' + xhr.responseText);
        }
      };
      xhr.onerror = function() {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Tallenna';
        alert('Verkkovirhe - tarkista nettiyhteys');
      };
      xhr.send(body);
    });
  </script>
</body>
</html>
